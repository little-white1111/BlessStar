appId: com.blessstar.config-editor
productName: BlessStar Config Editor
copyright: Copyright 漏 2026 BlessStar

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: "BlessStar Config Editor"

linux:
  target:
    - target: AppImage
      arch:
        - x64

extraResources:
  - from: native/
    to: native/
    filter:
      - "*.node"
      - "*.dll"
      - "*.pdb"
      - "*.so"
      - "*.dylib"
      - "index.js"
      - "index.d.ts"



