# Reusable Day19 smoke (900s) ? called by day19-stress-smoke.yml and ci.yml suite=day19-smoke.
on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      build_dir:
        required: false
        type: string
        default: build_day19_stress
      profile:
        required: false
        type: string
        default: smoke

jobs:
  smoke-900s:
    name: Day19 stress smoke (900s)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.ref }}

      - name: Configure
        run: cmake -S . -B "${{ inputs.build_dir }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build stress target
        run: cmake --build "${{ inputs.build_dir }}" --config Release --target bs_test_day19_stress_reload_loop

      - name: Run smoke profile
        shell: pwsh
        env:
          BS_DAY19_PROFILE: ${{ inputs.profile }}
        run: |
          powershell -ExecutionPolicy Bypass -File tools/scripts/perf/run_day19_stress_smoke.ps1 `
            -BuildDir "${{ inputs.build_dir }}" -Config Release -Profile $env:BS_DAY19_PROFILE

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day19-stress-smoke-${{ github.run_id }}
          path: |
            docs/day19_stress_smoke_latest.json
            docs/day19_stress_smoke_latest.csv
          if-no-files-found: ignore
