# Day21 KernelPool + A''' Executor scope — lightweight gate on feat/day21* branches.
# Full repo regression: .github/workflows/ci.yml (workflow display name: full test).
name: day21

on:
  push:
    branches:
      - "feat/day21*"
  pull_request:
    branches:
      - main
    paths:
      - "kernel/runtime/**"
      - "adapter/**"
      - "docs/contracts/kernel/kernel_pool.v1.json"
      - "tools/scripts/gates/check_kernel_pool_config.py"
      - "cmake/Tests.cmake"
      - ".github/workflows/day21.yml"
      - ".github/workflows/day21-reusable.yml"
  workflow_dispatch:

concurrency:
  group: day21-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day21:
    uses: ./.github/workflows/day21-reusable.yml
