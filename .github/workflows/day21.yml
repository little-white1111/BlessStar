# Day21 KernelPool + A''' Executor scope — lightweight gate on feat/day21* branches.
# Full repo regression: .github/workflows/ci.yml (workflow display name: full test).
name: day21

on:
  push:
    branches:
      - "feat/day21*"
  pull_request:
    branches:
      - main
    paths:
      - "kernel/runtime/**"
      - "adapter/**"
      - "docs/contracts/kernel/kernel_pool.v1.json"
      - "tools/scripts/gates/check_kernel_pool_config.py"
      - "cmake/Tests.cmake"
      - ".github/workflows/day21.yml"
  workflow_dispatch:

concurrency:
  group: day21-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config-gate:
    name: GATE-KERNEL-POOL-CONFIG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Kernel pool config (C-KERNEL-POOL-1)
        run: python tools/scripts/gates/check_kernel_pool_config.py

  kernel_pool:
    name: kernel_pool (Release · Linux)
    runs-on: ubuntu-latest
    needs: config-gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build-day21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBLESSSTAR_TREAT_WARNINGS_AS_ERRORS=ON

      - name: Build (kernel_pool targets only)
        run: |
          cmake --build build-day21 -j 4 --target \
            bs_test_kernel_executor bs_test_kernel_pool \
            bs_test_reload_per_batch_parallel_exec

      - name: Test / kernel_pool
        run: ctest --test-dir build-day21 -L kernel_pool --output-on-failure

  tsan:
    name: tsan (kernel_pool · IMPL-21-CI-01)
    runs-on: ubuntu-latest
    needs: config-gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure (ThreadSanitizer)
        run: |
          cmake -S . -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DBLESSSTAR_SANITIZER_CI=ON

      - name: Build (TSan)
        run: |
          cmake --build build-tsan -j 4 --target bs_test_kernel_executor bs_test_kernel_pool \
            bs_test_reload_per_batch_parallel_exec

      - name: Test / kernel_pool (TSan)
        run: ctest --test-dir build-tsan -L kernel_pool --output-on-failure
