# T19 smoke (900s) — schedule/dispatch + workflow_call from ci.yml (suite=day19-smoke).
name: day19-stress-smoke

on:
  workflow_dispatch:
    inputs:
      build_dir:
        description: CMake build directory
        required: false
        default: build_day19_stress
      profile:
        description: BS_DAY19_PROFILE (use smoke for 900s gate)
        required: false
        default: smoke
  schedule:
    - cron: "0 0 * * 0"
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      build_dir:
        required: false
        type: string
        default: build_day19_stress
      profile:
        required: false
        type: string
        default: smoke

concurrency:
  group: day19-stress-smoke
  cancel-in-progress: false

jobs:
  smoke-900s:
    name: Day19 stress smoke (900s)
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.checkout_ref != '' && inputs.checkout_ref || github.ref }}

      - name: Configure
        run: cmake -S . -B "${{ github.event_name == 'workflow_call' && inputs.build_dir || (github.event.inputs.build_dir || 'build_day19_stress') }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build stress target
        run: cmake --build "${{ github.event_name == 'workflow_call' && inputs.build_dir || (github.event.inputs.build_dir || 'build_day19_stress') }}" --config Release --target bs_test_day19_stress_reload_loop

      - name: Run smoke profile
        shell: pwsh
        env:
          BS_DAY19_PROFILE: ${{ github.event_name == 'workflow_call' && inputs.profile || (github.event.inputs.profile || 'smoke') }}
          BS_BUILD_DIR: ${{ github.event_name == 'workflow_call' && inputs.build_dir || (github.event.inputs.build_dir || 'build_day19_stress') }}
        run: |
          powershell -ExecutionPolicy Bypass -File tools/scripts/perf/run_day19_stress_smoke.ps1 `
            -BuildDir $env:BS_BUILD_DIR -Config Release -Profile $env:BS_DAY19_PROFILE

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day19-stress-smoke-${{ github.run_id }}
          path: |
            docs/day19_stress_smoke_latest.json
            docs/day19_stress_smoke_latest.csv
          if-no-files-found: ignore
