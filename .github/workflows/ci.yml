name: ci

on:
  push:
  pull_request:

jobs:
  cmake:
    name: cmake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Purity gate (manifest)
        run: python tools/purity/verify_manifest.py verify --kernel factory --manifest factory/manifest.sha256

      - name: Include gate (R8-03 + R8-13)
        if: runner.os == 'Linux'
        run: python tools/purity/check_includes.py --repo-root .

      - name: Freeze order gate (R8-09)
        if: runner.os == 'Linux'
        run: python tools/purity/check_freeze_order.py --repo-root .

      - name: BlessStar Config JSON v1 (M1 + day10 money normalize smoke)
        shell: bash
        run: |
          python tools/normalize/examples/identity_normalize.py tools/normalize/examples/blessstar_config_v1.minimal.json blessstar_canonical_ci.json
          python -c "import json; d=json.load(open('blessstar_canonical_ci.json',encoding='utf-8')); assert d['kernel_version']=='0.4.0'"
          python tools/normalize/examples/money_normalize.py tools/normalize/examples/blessstar_config_v1.money_good.json blessstar_money_ci.json
          set +e
          python tools/normalize/examples/money_normalize.py tools/normalize/examples/blessstar_config_v1.money_bad_tax.json blessstar_money_bad_ci.json
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "money_normalize on bad input: expected exit 1, got $rc"
            exit 1
          fi

      # AGENTS gate 3: clang-format (Linux only; use runner preinstall — avoid apt-get hang)
      - name: clang-format
        if: runner.os == 'Linux'
        run: |
          CLANG_FORMAT="$(command -v clang-format-18 || command -v clang-format-16 || command -v clang-format)"
          echo "Using ${CLANG_FORMAT}"
          "${CLANG_FORMAT}" --version
          git ls-files '*.cpp' '*.h' '*.hpp' '*.cc' '*.c' | grep -v '^Source/' | xargs -r "${CLANG_FORMAT}" --dry-run --Werror

      # AGENTS gate 1: CTest (below). Gate 4: warnings as errors via CMake option.
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBLESSSTAR_TREAT_WARNINGS_AS_ERRORS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DBLESSSTAR_TREAT_WARNINGS_AS_ERRORS=ON

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Test / CTest (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test / CTest (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

  sanitizer:
    name: sanitizer (Linux Clang ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Sanitizer)
        run: |
          cmake -S . -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (Sanitizer)
        run: cmake --build build-san -j 4

      - name: Test / CTest (Sanitizer)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/cmake/lsan_suppressions.txt
        run: ctest --test-dir build-san --output-on-failure

  meson:
    name: meson (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Meson + Ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Configure
        run: meson setup build-meson

      - name: Build
        run: meson compile -C build-meson

      - name: Test
        run: meson test -C build-meson --print-errorlogs
