# Full repo regression (all CTest + purity + contract + sanitizer + meson).
# Unified dispatch: workflow_dispatch.inputs.suite calls day21/day19 workflows via workflow_call.
# Same yml files also handle push/schedule/direct dispatch (no separate *-reusable.yml).
name: full test

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to checkout and test (empty = use dispatch ref)"
        required: false
        type: string
        default: ""
      suite:
        description: "CI suite (full = default regression; others call day21/day19 workflows)"
        required: false
        type: choice
        options:
          - full
          - day21
          - day19-smoke
          - day19-smoke-fail
          - day19-gha-6h
          - day19-full
        default: full
      day19_runner:
        description: "suite=day19-full only: self-hosted (72h) or github-hosted (fail-fast guard)"
        required: false
        type: choice
        options:
          - self-hosted
          - github-hosted
        default: self-hosted

jobs:
  cmake:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'full'
    name: cmake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '' && github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Purity gate (manifest)
        run: python tools/purity/verify_manifest.py verify --kernel factory --manifest factory/manifest.sha256

      - name: Include gate (R8-03 + R8-13)
        if: runner.os == 'Linux'
        run: python tools/purity/check_includes.py --repo-root .

      - name: Freeze order gate (R8-09)
        if: runner.os == 'Linux'
        run: python tools/purity/check_freeze_order.py --repo-root .

      - name: BlessStar Config JSON v1 (M1 + day10 money normalize smoke)
        shell: bash
        run: |
          python tools/normalize/examples/identity_normalize.py tools/normalize/examples/blessstar_config_v1.minimal.json blessstar_canonical_ci.json
          python -c "import json; d=json.load(open('blessstar_canonical_ci.json',encoding='utf-8')); assert d['kernel_version']=='0.4.0'"
          python tools/normalize/examples/money_normalize.py tools/normalize/examples/blessstar_config_v1.money_good.json blessstar_money_ci.json
          set +e
          python tools/normalize/examples/money_normalize.py tools/normalize/examples/blessstar_config_v1.money_bad_tax.json blessstar_money_bad_ci.json
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "money_normalize on bad input: expected exit 1, got $rc"
            exit 1
          fi

      # AGENTS gate 3: clang-format (Linux only; use runner preinstall — avoid apt-get hang)
      - name: clang-format
        if: runner.os == 'Linux'
        run: |
          CLANG_FORMAT="$(command -v clang-format-18 || command -v clang-format-16 || command -v clang-format)"
          echo "Using ${CLANG_FORMAT}"
          "${CLANG_FORMAT}" --version
          failed=0
          while IFS= read -r f; do
            if ! "${CLANG_FORMAT}" --dry-run --Werror "${f}"; then
              echo "clang-format failed: ${f}"
              failed=1
            fi
          done < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cc' '*.c' | grep -v '^Source/')
          exit "${failed}"

      # AGENTS gate 1: CTest (below). Gate 4: warnings as errors via CMake option.
      - name: Configure (Unix - via build.py)
        if: runner.os != 'Windows'
        run: |
          eval "$(python tools/build/build.py --release --print-cmake-args --build-dir=build_ci_test)"

      - name: Configure (Windows - via build.py)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $json = python tools/build/build.py --release --print-cmake-args --build-dir=build_ci_test --format=json | ConvertFrom-Json
          $cmd = $json.args[0]
          $cmdArgs = $json.args[1..($json.args.Count-1)]
          & $cmd @cmdArgs

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build_ci_test

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build_ci_test --config Release

      - name: Contract compile (D-scheme)
        run: python tools/scripts/contracts/contract_compile.py

      - name: Contract gate runner (D-scheme)
        run: python tools/scripts/contracts/contract_gate_runner.py

      - name: Test / CTest (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build_ci_test --output-on-failure -j 1

      - name: Test / CTest (Windows)
        if: runner.os == 'Windows'
        env:
          BS_ATTACH_RELOAD_TRACE: "1"
          BS_WAIT_TRACE: "hang"
          BS_WAIT_TRACE_HANG_MS: "500"
          BS_SHORTCOMING_VERBOSE: "1"
        run: ctest --test-dir build_ci_test --output-on-failure -C Release -j 1

      - name: Upload attach hang diagnostics (Windows)
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-ctest-diagnostics-${{ github.run_id }}
          path: |
            build_ci_test/Testing/Temporary/LastTest.log
            build_ci_test/Testing/Temporary/
          retention-days: 14
          if-no-files-found: warn

  sanitizer:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'full'
    name: sanitizer (Linux Clang ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '' && github.event.inputs.branch || github.ref }}

      - name: Configure (Sanitizer - via build.py)
        run: |
          eval "$(python tools/build/build.py --sanitize --print-cmake-args --build-dir=build-san)"

      - name: Build (Sanitizer)
        run: cmake --build build-san -j 4

      - name: Test / CTest (Sanitizer)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/cmake/lsan_suppressions.txt
          BS_ATTACH_RELOAD_TRACE: "1"
          BS_WAIT_TRACE: "hang"
          BS_WAIT_TRACE_HANG_MS: "500"
          BS_SHORTCOMING_VERBOSE: "1"
        # day17 Python/contract gates assume build_ci_test; runtime ASan coverage skips them.
        run: ctest --test-dir build-san -LE day17 --output-on-failure

      - name: Day19 stress (ci profile, ASan build)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          BS_ATTACH_RELOAD_TRACE: "1"
          BS_WAIT_TRACE: "hang"
          BS_WAIT_TRACE_HANG_MS: "500"
          BS_SHORTCOMING_VERBOSE: "1"
        run: ctest --test-dir build-san -R bs_test_day19_stress_reload_loop --output-on-failure

      - name: Upload attach hang diagnostics (Sanitizer)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-ctest-diagnostics-${{ github.run_id }}
          path: |
            build-san/Testing/Temporary/LastTest.log
            build-san/Testing/Temporary/
          retention-days: 14
          if-no-files-found: warn

  tsan:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'full'
    name: tsan (Linux Clang day20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '' && github.event.inputs.branch || github.ref }}

      - name: Configure (TSan - via build.py)
        run: |
          eval "$(python tools/build/build.py --tsan --print-cmake-args --build-dir=build-tsan)"

      - name: Build (TSan)
        run: |
          cmake --build build-tsan -j 4 --target bs_test_kernel_executor bs_test_kernel_pool \
            bs_test_reload_per_batch_parallel_exec

      - name: Test / kernel_pool (TSan · IMPL-21-CI-01)
        run: ctest --test-dir build-tsan -L kernel_pool --output-on-failure

  meson:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'full'
    name: meson (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '' && github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Meson + Ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Configure
        run: meson setup build-meson

      - name: Build
        run: meson compile -C build-meson

      - name: Test
        run: meson test -C build-meson --print-errorlogs

  docker:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'full'
    name: docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - blessstar-cmake-gcc
          - blessstar-cmake-clang
          - blessstar-san
          - blessstar-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != '' && github.event.inputs.branch || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        run: |
          if [ "${{ matrix.service }}" = "blessstar-arm64" ]; then
            docker compose --profile arm64 build ${{ matrix.service }}
          else
            docker compose build ${{ matrix.service }}
          fi

      - name: Run tests (${{ matrix.service }})
        run: |
          if [ "${{ matrix.service }}" = "blessstar-arm64" ]; then
            docker compose --profile arm64 up --abort-on-container-exit --exit-code-from ${{ matrix.service }} ${{ matrix.service }}
          else
            docker compose up --abort-on-container-exit --exit-code-from ${{ matrix.service }} ${{ matrix.service }}
          fi

  day21-suite:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'day21'
    uses: ./.github/workflows/day21.yml
    with:
      checkout_ref: ${{ github.event.inputs.branch }}

  day19-smoke-suite:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'day19-smoke'
    uses: ./.github/workflows/day19-stress-smoke.yml
    with:
      checkout_ref: ${{ github.event.inputs.branch }}

  day19-smoke-fail-suite:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'day19-smoke-fail'
    uses: ./.github/workflows/day19-stress-smoke-fail.yml
    with:
      checkout_ref: ${{ github.event.inputs.branch }}

  day19-gha-6h-suite:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'day19-gha-6h'
    uses: ./.github/workflows/day19-stress-gha-6h.yml
    with:
      checkout_ref: ${{ github.event.inputs.branch }}

  day19-full-suite:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'day19-full'
    uses: ./.github/workflows/day19-stress-full.yml
    with:
      checkout_ref: ${{ github.event.inputs.branch }}
      runner: ${{ github.event.inputs.day19_runner }}
