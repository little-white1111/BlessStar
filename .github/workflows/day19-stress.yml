name: day19-stress

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  smoke:
    name: Day19 stress smoke (900s)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build stress target
        run: cmake --build build --config Release --target bs_test_day19_stress_reload_loop

      - name: Run smoke profile
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools/scripts/perf/run_day19_stress_smoke.ps1 `
            -BuildDir build -Config Release -Profile smoke

  full-72h:
    name: Day19 stress full (Linux 72h)
    runs-on: ubuntu-latest
    timeout-minutes: 4500
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j 4 --target bs_test_day19_stress_reload_loop

      - name: Run full profile
        run: bash tools/scripts/perf/run_day19_stress_full_linux.sh
