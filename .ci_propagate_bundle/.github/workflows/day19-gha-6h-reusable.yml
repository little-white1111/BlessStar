# Reusable Day19 gha_6h (~5h50m) — called by day19-stress-gha-6h.yml and ci.yml suite=day19-gha-6h.
on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      build_dir:
        required: false
        type: string
        default: build_day19_gha_6h
      profile:
        required: false
        type: string
        default: gha_6h

jobs:
  gha-6h:
    name: Day19 stress gha_6h (ubuntu ~5h50m)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.ref }}

      - name: Configure
        run: cmake -S . -B "${{ inputs.build_dir }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build stress target
        run: cmake --build "${{ inputs.build_dir }}" -j 2 --target bs_test_day19_stress_reload_loop

      - name: Run gha_6h profile
        env:
          BUILD_DIR: ${{ inputs.build_dir }}
          BS_DAY19_PROFILE: ${{ inputs.profile }}
          BS_DAY19_STRESS_OUT: docs/day19_stress_gha_6h_latest.csv
          BS_DAY19_STRESS_JSON: docs/day19_stress_gha_6h_latest.json
        run: bash tools/scripts/perf/run_day19_stress_gha_6h_linux.sh

      - name: Upload gha_6h artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: day19-stress-gha-6h-${{ github.run_id }}
          path: |
            docs/day19_stress_gha_6h_latest.csv
            docs/day19_stress_gha_6h_latest.json
          if-no-files-found: ignore
